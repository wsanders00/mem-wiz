name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install project and test dependencies
        run: python -m pip install -e . pytest

      - name: Run test suite
        run: PYTHONDONTWRITEBYTECODE=1 python -m pytest -q

      - name: Build release artifact
        run: python scripts/build_skill_artifact.py

      - name: Generate checksum asset
        run: |
          artifact_path="$(ls dist/mem-wiz-skill-*.zip)"
          sha256sum "$artifact_path" > "$artifact_path.sha256"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          artifact_path="$(ls dist/mem-wiz-skill-*.zip)"
          gh release upload "$GITHUB_REF_NAME" "$artifact_path" "$artifact_path.sha256" --clobber
